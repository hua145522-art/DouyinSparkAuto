name: Auto Douyin Spark
on:
  schedule:
    # 每天 北京时间 晚上20:00（晚8点整）自动运行，时区已换算完毕
    - cron: '0 12 * * *'
  workflow_dispatch:

# 【核心新增：强制全局使用Node.js 24】
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run auto script
        env:
          COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          FRIEND_ID: ${{ secrets.FRIEND_ID }}
          SEND_MSG: ${{ secrets.SEND_MSG }}
        run: |
          python .github/workflows/main.py
