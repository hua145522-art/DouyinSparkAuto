name: Auto Douyin Spark

on:
  schedule:
    # 每天 北京时间 23:00（UTC 15:00）
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests
          fi

      - name: ⏱️ Random delay (anti-detection)
        run: |
          echo "Sleeping random time..."
          sleep $((RANDOM % 30 + 5))

      - name: 🚀 Run auto script
        env:
          COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          FRIEND_UID: ${{ secrets.FRIEND_ID }}
          SEND_MSG: ${{ secrets.SEND_CONTENT }}
        run: |
          echo "Starting script..."
          python main.py || echo "Script execution failed"

      - name: ✅ Done
        run: echo "Workflow finished"
